<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>newagecrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:      #ece7dd;
    --ink:        #1c1a17;
    --ink-soft:   #4a453d;
    --ash:        #948c7e;
    --line:       #c9c1b0;
    --cork:       #966563;

    --display: 'Archivo', sans-serif;
    --sans:    'Inter', sans-serif;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .grain{
    position:fixed; inset:0; pointer-events:none; z-index:99;
    opacity:.05; mix-blend-mode:multiply;
  }

  .wrap{
    width:100%;
    max-width:420px;
    padding: 56px 26px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .photo{
    width:100%;
    aspect-ratio: 16/6;
    overflow:hidden;
    border:1px solid var(--line);
    margin-bottom:28px;
    position:relative;
  }
  .photo img{
    width:100%; height:100%; object-fit:cover; object-position:center 30%;
    filter:saturate(.92) contrast(1.03);
  }

  .eyebrow{
    font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--ash); font-weight:500; margin-bottom:14px;
  }

  h1{
    font-family:var(--display); font-weight:800; letter-spacing:-.02em;
    font-size:36px; line-height:1;
    margin-bottom:12px;
  }

  .tagline{
    font-size:13.5px; line-height:1.6; color:var(--ink-soft); font-weight:300;
    max-width:300px; margin-bottom:38px;
  }

  .links{
    width:100%;
    display:flex; flex-direction:column; gap:12px;
  }

  .link{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%;
    padding: 17px 20px;
    border:1px solid var(--ink);
    background:transparent;
    font-size:13px; letter-spacing:.06em; text-transform:uppercase; font-weight:500;
    color:var(--ink);
    text-decoration:none;
    position:relative; overflow:hidden;
  }
  .link span{ position:relative; z-index:2; transition:color .4s; }
  .link svg{ position:relative; z-index:2; width:15px; height:15px; flex-shrink:0; transition:stroke .4s; }
  .link::before{
    content:''; position:absolute; inset:0; background:var(--ink);
    transform:translateY(101%); transition:transform .45s cubic-bezier(.2,.6,.2,1);
    z-index:1;
  }
  .link:hover::before{ transform:translateY(0); }
  .link:hover span{ color:var(--paper); }
  .link:hover svg{ stroke:var(--paper); }

  .link.primary{ background:var(--ink); }
  .link.primary span{ color:var(--paper); }
  .link.primary svg{ stroke:var(--paper); }
  .link.primary::before{ background:var(--cork); }

  footer{
    margin-top:56px;
    font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ash);
  }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

<svg class="grain" width="100%" height="100%">
  <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#noise)"/>
</svg>

<div class="wrap">

  <div class="photo">
<img src="123124124.jpg" alt="NEWAGECRACK">
  </div>

  <h1>newagecrack</h1>


  <div class="links">
    <a class="link" href="https://www.instagram.com/newagecrack/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>
      <span>Instagram</span>
    </a>
    <a class="link" href="https://www.youtube.com/@newagecrack" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg>
      <span>YouTube</span>
    </a>
    <a class="link" href="https://soundcloud.com/user-858210719-297716059?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 15v2M5 12v6M8 10v10M11 13v5M14 8v10M17 11v6M20 13v3"/></svg>
      <span>SoundCloud</span>

    <a class="link" href="https://www.beatstars.com/newagecrack" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.5 12.7L12.8 20.4a2 2 0 0 1-2.83 0l-6.37-6.37a2 2 0 0 1 0-2.83L11.3 3.5H19a1.5 1.5 0 0 1 1.5 1.5v7.7z"/><circle cx="15.5" cy="8.5" r="1.3"/></svg>
      <span>BeatStars</span>
    </a>
    <a class="link" href="mailto:agecrack@gmail.com">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="4.5" width="19" height="15" rx="2"/><path d="M3 6l9 7 9-7"/></svg>

  </div>

</div>

</body>
</html>
